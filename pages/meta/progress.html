<h1><span lang="zh">学习进度</span><span lang="en">Progress</span></h1>
<p class="lesson-subtitle"><span lang="zh">基于本地 localStorage 记录. 每完成一章点击章末"标记完成"按钮即更新. 数据仅存在本浏览器, 清缓存或换设备会重置.</span><span lang="en">Tracked in localStorage. Click "Mark complete" at the end of each chapter. Local only — clearing cache or switching device resets it.</span></p>

<div id="progress-container"></div>

<button class="reset-progress" onclick="if(confirm('清除所有学习进度?')){localStorage.removeItem('site.progress');location.reload();}">
<span lang="zh">重置全部进度</span><span lang="en">Reset all progress</span>
</button>

<script>
(async function() {
  const root = '../../';
  const r = await fetch(root + 'assets/data/nav-tree.json?v=' + Date.now(), { cache: 'no-store' });
  const tree = await r.json();
  let prog = {};
  try { prog = JSON.parse(localStorage.getItem('site.progress') || '{}'); } catch {}
  const container = document.getElementById('progress-container');
  const lang = document.documentElement.getAttribute('data-lang') || 'zh';

  let html = '';
  let totalDone = 0, totalChapters = 0;
  for (const mod of tree.modules) {
    if (mod.id === 'meta') continue;
    const chapters = mod.chapters.filter(c => c.slug !== 'overview' && c.n !== '');
    const done = chapters.filter(c => {
      const fn = c.n ? `${c.n}-${c.slug}.html` : `${c.slug}.html`;
      const key = mod.path.replace(/^pages\//, '') + '/' + fn;
      return prog[key] && prog[key].done;
    }).length;
    const pct = chapters.length > 0 ? Math.round(100 * done / chapters.length) : 0;
    totalDone += done; totalChapters += chapters.length;
    const title = lang === 'zh' ? mod.title_zh : mod.title_en;
    html += `<div class="module-progress">
      <h3><span>${mod.roman} · ${title}</span><span class="pct">${done}/${chapters.length} · ${pct}%</span></h3>
      <ul class="chapter-list">`;
    for (const ch of mod.chapters) {
      if (ch.slug === 'overview' || ch.n === '') continue;
      const fn = ch.n ? `${ch.n}-${ch.slug}.html` : `${ch.slug}.html`;
      const key = mod.path.replace(/^pages\//, '') + '/' + fn;
      const isDone = !!(prog[key] && prog[key].done);
      const ctitle = lang === 'zh' ? ch.title_zh : ch.title_en;
      html += `<li><span class="ch-name">${ch.n} · ${ctitle}</span>
        <span class="${isDone ? 'ch-done' : 'ch-todo'}">${isDone ? '✓ done' : '— todo'}</span></li>`;
    }
    html += `</ul></div>`;
  }
  const overallPct = totalChapters > 0 ? Math.round(100 * totalDone / totalChapters) : 0;
  container.innerHTML = `<div class="module-progress" style="border-color: var(--accent); border-width: 2px;">
    <h3><span><strong>${lang === 'zh' ? '总进度' : 'Overall'}</strong></span><span class="pct"><strong>${totalDone}/${totalChapters} · ${overallPct}%</strong></span></h3>
  </div>` + html;
})();
</script>
